{% extends "base.html" %}

{% block title %}Importar asistencia{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Carga manual de Excel de Croschex</h1>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary" type="submit">Subir archivo</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
